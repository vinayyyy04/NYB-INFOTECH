<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section class="car">
    <img src="BWM.jpg" alt="BMW M4">

    <div class="content">
        <h2>BMW M4 Competition</h2>
        <p>
            Experience luxury, speed, and comfort with the all-new BMW M4.
            Book your dream car today.
        </p>
        <button>Book Test Drive</button>
    </div>
</section>
</body>

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    display:flex;
    justify-content:center;
    gap:30px;
    background:#444;
    padding:15px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:20px;
}

.car{
    display:flex;
    align-items:center;
    gap:40px;
    padding:40px;
}

.car img{
    width:500px;
    border-radius:10px;
}

.content h2{
    font-size:36px;
    margin-bottom:20px;
}

.content p{
    font-size:20px;
    line-height:1.6;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    font-size:18px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

/* Mobile */
@media(max-width:480px){

    nav{
        flex-direction:column;
        gap:10px;
    }

    nav a{
        font-size:14px;      /* Typography */
    }

    .car{
        flex-direction:column;
        padding:15px;        /* Spacing */
        text-align:center;
    }

    .car img{
        width:100%;          /* Image */
    }

    .content h2{
        font-size:24px;      /* Typography */
    }

    .content p{
        font-size:16px;
    }

    button{
        font-size:14px;
    }
}

/* Tablet */
@media(min-width:481px) and (max-width:768px){

    .car{
        flex-direction:column;
        padding:25px;
        text-align:center;
    }

    .car img{
        width:80%;
    }

    nav a{
        font-size:17px;
    }

    .content h2{
        font-size:30px;
    }

    .content p{
        font-size:18px;
    }
}

/* Laptop */
@media(min-width:769px) and (max-width:1024px){

    .car img{
        width:400px;
    }

    nav a{
        font-size:18px;
    }

    .content h2{
        font-size:32px;
    }

    .content p{
        font-size:19px;
    }
}

/* Desktop */
@media(min-width:1025px){

    .car img{
        width:500px;
    }

    nav a{
        font-size:20px;
    }

    .content h2{
        font-size:36px;
    }

    .content p{
        font-size:20px;
    }
}
</style>
</html>
