<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Card</title>
    <link rel="stylesheet" href="Ecommerce.css">
</head>
<body>
    <div class="product-card">
        <!-- Product Image & Discount Badge -->
        <div class="product-image-container">
            <span class="discount-badge">50% off</span>
            <img src="headphones.jpg" alt="Wireless Headphones" class="product-image">
        </div>

<!-- Product Content -->
<div class="product-content">
    <span class="product-category">Electronics</span>
    <h3 class="product-name">Wireless Headphones</h3>
</div>


<!-- Price Section -->

    <div class="product-price">
        <span class="current-price">149/-Rs</span><br>
        <span class="original-price">199/-Rs</span>
    </div>

    <div>
        <h4>Rating</h4>
        <p>****</p>
    </div>

<!-- Add to Cart Button -->

  <button class="button-add-to-cart"> Add to Cart</button>
</div>
</div>
</body>
</html>
